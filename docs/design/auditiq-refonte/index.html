<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AuditIQ — Refonte App</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;450;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link href="components.css" rel="stylesheet" />
<style>
/* =============================================================================
   AuditIQ — Refonte. Design tokens, dark + light.
   Built on the existing Supabase-style DA (near-black surfaces, regulatory
   green accent, tricolor fairness status, mono labels). Geist replaces the
   system font; a warm-stone light theme is added.
   ============================================================================= */

:root,
[data-theme="dark"] {
  /* Surfaces */
  --bg: #0f0f0f;
  --surface: #161616;
  --surface-2: #1c1c1c;
  --surface-3: #232323;
  --surface-inset: #121212;
  --surface-glass: rgba(22, 22, 22, 0.82);

  /* Text */
  --fg: #fafafa;
  --fg-secondary: #b2b2b2;
  --fg-muted: #8a8a8a;
  --fg-disabled: #565656;

  /* Borders */
  --border-subtle: #242424;
  --border: #2d2d2d;
  --border-strong: #393939;

  /* Regulatory green accent */
  --accent: oklch(72% 0.135 162);
  --accent-hover: oklch(78% 0.14 162);
  --accent-strong: oklch(56% 0.11 162);
  --accent-soft: oklch(72% 0.135 162 / 0.13);
  --accent-softer: oklch(72% 0.135 162 / 0.07);
  --accent-border: oklch(72% 0.135 162 / 0.30);
  --accent-fg: #07140d;

  /* Tricolor fairness status */
  --pass: oklch(72% 0.135 162);
  --warn: oklch(80% 0.14 78);
  --fail: oklch(66% 0.19 25);
  --info: oklch(70% 0.12 245);
  --neutral: #8a8a8a;

  --pass-bg: oklch(72% 0.135 162 / 0.13);
  --warn-bg: oklch(80% 0.14 78 / 0.13);
  --fail-bg: oklch(66% 0.19 25 / 0.13);
  --info-bg: oklch(70% 0.12 245 / 0.13);

  --pass-border: oklch(72% 0.135 162 / 0.32);
  --warn-border: oklch(80% 0.14 78 / 0.32);
  --fail-border: oklch(66% 0.19 25 / 0.32);
  --info-border: oklch(70% 0.12 245 / 0.32);

  --focus-ring: oklch(72% 0.135 162 / 0.55);
  --track: #2a2a2a;

  --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.35);
  --shadow-md: 0 4px 16px -4px rgba(0, 0, 0, 0.5);
  --shadow-lg: 0 18px 50px -12px rgba(0, 0, 0, 0.7);
  --shadow-pop: 0 12px 40px -8px rgba(0, 0, 0, 0.66);
}

[data-theme="light"] {
  --bg: #f6f6f4;
  --surface: #ffffff;
  --surface-2: #f4f3f1;
  --surface-3: #eceae6;
  --surface-inset: #faf9f7;
  --surface-glass: rgba(255, 255, 255, 0.80);

  --fg: #1a1917;
  --fg-secondary: #57534e;
  --fg-muted: #8c867d;
  --fg-disabled: #bdb8af;

  --border-subtle: #eceae6;
  --border: #e0ddd7;
  --border-strong: #cfcbc2;

  --accent: oklch(54% 0.115 162);
  --accent-hover: oklch(48% 0.115 162);
  --accent-strong: oklch(44% 0.10 162);
  --accent-soft: oklch(60% 0.13 162 / 0.12);
  --accent-softer: oklch(60% 0.13 162 / 0.06);
  --accent-border: oklch(54% 0.115 162 / 0.28);
  --accent-fg: #ffffff;

  --pass: oklch(52% 0.12 162);
  --warn: oklch(64% 0.135 70);
  --fail: oklch(56% 0.19 25);
  --info: oklch(54% 0.13 250);
  --neutral: #8c867d;

  --pass-bg: oklch(60% 0.13 162 / 0.12);
  --warn-bg: oklch(72% 0.14 75 / 0.16);
  --fail-bg: oklch(62% 0.19 25 / 0.11);
  --info-bg: oklch(58% 0.13 250 / 0.11);

  --pass-border: oklch(52% 0.12 162 / 0.28);
  --warn-border: oklch(64% 0.135 70 / 0.34);
  --fail-border: oklch(56% 0.19 25 / 0.28);
  --info-border: oklch(54% 0.13 250 / 0.28);

  --focus-ring: oklch(54% 0.115 162 / 0.5);
  --track: #e6e3dd;

  --shadow-sm: 0 1px 2px rgba(40, 36, 30, 0.05);
  --shadow-md: 0 4px 14px -4px rgba(40, 36, 30, 0.10);
  --shadow-lg: 0 18px 44px -14px rgba(40, 36, 30, 0.16);
  --shadow-pop: 0 12px 36px -8px rgba(40, 36, 30, 0.16);
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv01", "cv03", "ss03";
  transition: color 0.3s ease;
}

:root {
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
  --font-mono: "Geist Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --sidebar-w: 256px;
}

img, svg, video { display: block; max-width: 100%; }
button { font-family: inherit; background: none; border: 0; cursor: pointer; padding: 0; color: inherit; }
input, textarea, select { font-family: inherit; }
a { color: inherit; text-decoration: none; }
h1, h2, h3, h4, h5, h6 { margin: 0; font-weight: 600; letter-spacing: -0.018em; line-height: 1.15; }
p { margin: 0; }
ul, ol { margin: 0; }

::selection { background: var(--accent-soft); color: var(--fg); }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; border: 3px solid transparent; background-clip: padding-box; }
::-webkit-scrollbar-thumb:hover { background: var(--fg-disabled); background-clip: padding-box; }
::-webkit-scrollbar-track { background: transparent; }

:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

.mono { font-family: var(--font-mono); font-feature-settings: "tnum"; }
.tnum { font-variant-numeric: tabular-nums; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.13em;
  text-transform: uppercase;
  color: var(--fg-muted);
}

#root { min-height: 100vh; }

.app-loading {
  position: fixed; inset: 0; display: grid; place-items: center;
  color: var(--fg-muted); font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.1em;
}
.app-loading span { animation: pulse 1.4s var(--ease-out) infinite; }
@keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }

@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.fade-up { animation: fadeUp 0.4s var(--ease-out) both; }
.fade-in { animation: fadeIn 0.35s var(--ease-out) both; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
}
</style>
</head>
<body>
<div id="root"><div class="app-loading"><span>AUDITIQ · CHARGEMENT</span></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="pages_core.jsx"></script>
<script type="text/babel" src="pages_wizard.jsx"></script>
<script type="text/babel" src="pages_result.jsx"></script>
<script type="text/babel" src="pages_secondary.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
